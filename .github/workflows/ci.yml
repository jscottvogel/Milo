name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install
      - run: uv sync
      - name: Lint
        run: make lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v2
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install
      - run: uv sync
      - name: Typecheck
        run: make typecheck

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v2
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install
      - run: uv sync
      - name: Test Unit
        run: make test-unit

  cdk-synth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install
      - name: Configure AWS Credentials (OIDC placeholder)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/github-actions-role
          aws-region: us-east-1
        continue-on-error: true
      - name: CDK Synth
        run: make cdk-synth

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v2
      - run: uv sync
      - name: Run Bandit
        run: uv run bandit -r . -c pyproject.toml

  integration-test:
    runs-on: ubuntu-latest
    needs: [test-unit, cdk-synth]
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v2
      - run: uv sync
      - name: Run Integration Tests
        run: echo "Skipping actual AWS deployment for PoC CI. In production, this runs against deployed Function URL."
