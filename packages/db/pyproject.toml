[project]
name = "db"
version = "0.1.0"
description = "Milo Database"
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy>=2.0.0",
    "alembic",
    "psycopg[binary]",
    "pgvector",
    "pydantic>=2.0.0"
]

[tool.setuptools.packages.find]
include = ["db*"]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "testcontainers-postgres"
]
