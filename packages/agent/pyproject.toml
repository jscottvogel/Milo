[project]
name = "agent"
version = "0.1.0"
description = "Milo Agent Runtime Core"
requires-python = "==3.12.*"
dependencies = [
    "langgraph>=0.2.0",
    "langchain-core>=0.2.0",
    "boto3>=1.34.0",
    "pydantic>=2.0.0",
    "db",
    "shared-schemas",
    "duckduckgo-search>=8.1.1",
    "httpx>=0.28.1",
    "beautifulsoup4>=4.14.3",
    "nylas>=6.4.0",
    "markitdown[all]>=0.1.5",
    "pypandoc>=1.14",
]

[tool.uv.sources]
db = { workspace = true }
shared-schemas = { workspace = true }

[tool.setuptools.packages.find]
include = ["agent*"]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
    "pytest-asyncio",
    "moto"
]
